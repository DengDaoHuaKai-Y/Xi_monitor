services:
  postgres:
    image: postgres:16-alpine
    container_name: xi-monitor-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - xi-monitor-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  xi-monitor:
    image: ${XI_MONITOR_IMAGE:-ghcr.io/dengdaohuakai-y/xi_monitor:latest}
    container_name: xi-monitor
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${XI_MONITOR_HTTP_PORT:-80}:8080"
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  xi-monitor-postgres-data:
