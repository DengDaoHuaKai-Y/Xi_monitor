server:
  addr: ":8080"

security:
  session_secret: "change-me-session-secret"
  # Either a 32-byte raw string or base64-encoded 32-byte key.
  encryption_key: "change-me-32-byte-encryption-key"

admin:
  username: "admin"
  # Generate with: go run ./cmd/server -hash-password "your-password"
  password_hash: "$2a$10$hVl1d/EjxPSOCqXp.QqbGeNhPw3Fz5GGjFyqnJdWrEOPPqrWr.ncW"

database:
  dsn: "postgres://postgres:123456789@localhost:5432/postgres?sslmode=disable"

poller:
  interval_seconds: 1800
